<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FoxyWall VPN</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .title {
    color: #fff;
    font-size: 24px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .title span { color: #ff6b35; }

  .subtitle {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    margin-bottom: 30px;
    text-align: center;
  }

  .fox-container {
    position: relative;
    width: 280px;
    height: 280px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }

  .fox-body {
    position: absolute;
    width: 100%;
    height: 100%;
    transition: transform 0.3s ease;
  }

  .fox-container:active .fox-body { transform: scale(0.95); }

  .fox-container.happy .fox-body {
    animation: foxHappy 0.6s ease;
  }

  @keyframes foxHappy {
    0% { transform: scale(1) rotate(0deg); }
    25% { transform: scale(1.1) rotate(-5deg); }
    50% { transform: scale(1.05) rotate(5deg); }
    75% { transform: scale(1.1) rotate(-3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .heart {
    position: absolute;
    font-size: 24px;
    animation: floatHeart 1s ease-out forwards;
    pointer-events: none;
    opacity: 0;
  }

  @keyframes floatHeart {
    0% { opacity: 1; transform: translateY(0) scale(0.5); }
    50% { opacity: 1; transform: translateY(-60px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.8); }
  }

  .sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #ffcc00;
    border-radius: 50%;
    animation: sparkle 0.8s ease-out forwards;
    pointer-events: none;
  }

  @keyframes sparkle {
    0% { opacity: 1; transform: scale(0); }
    50% { opacity: 1; transform: scale(1.5); }
    100% { opacity: 0; transform: scale(0) translateY(-40px); }
  }

  .pet-counter {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    margin-top: 20px;
    text-align: center;
  }

  .fox-idle { animation: breathe 3s ease-in-out infinite; }

  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .fox-tail {
    transform-origin: 70% 85%;
    animation: tailWag 2s ease-in-out infinite;
  }

  @keyframes tailWag {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(10deg); }
    75% { transform: rotate(-10deg); }
  }

  .paw-prints {
    position: fixed;
    bottom: 20px;
    color: rgba(255,255,255,0.15);
    font-size: 20px;
    letter-spacing: 8px;
  }

  /* Platform selection screen */
  .platform-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: fadeIn 0.5s ease;
  }

  .platform-screen.visible {
    display: flex;
  }

  .platform-title {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
  }

  .platform-subtitle {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    text-align: center;
    margin-bottom: 12px;
  }

  .platform-btn {
    width: 260px;
    padding: 16px 24px;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: transform 0.2s;
  }

  .platform-btn:active { transform: scale(0.95); }

  .platform-btn.ios {
    background: linear-gradient(135deg, #007AFF, #5856D6);
    color: #fff;
  }

  .platform-btn.android {
    background: linear-gradient(135deg, #34A853, #0F9D58);
    color: #fff;
  }

  .platform-btn .icon { font-size: 24px; }

  .promo-code {
    background: rgba(255,255,255,0.1);
    border: 2px dashed rgba(255,255,255,0.3);
    border-radius: 12px;
    padding: 16px 24px;
    text-align: center;
    display: none;
    animation: fadeIn 0.5s ease;
  }

  .promo-code.visible { display: block; }

  .promo-code .label {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    margin-bottom: 8px;
  }

  .promo-code .code {
    color: #ff6b35;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 3px;
  }

  .promo-code .hint {
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    margin-top: 8px;
  }

  .back-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    cursor: pointer;
    margin-top: 12px;
    padding: 8px 16px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fox-screen { display: flex; flex-direction: column; align-items: center; }
  .fox-screen.hidden { display: none; }
</style>
</head>
<body>

<!-- Fox petting screen -->
<div class="fox-screen" id="foxScreen">

  <div class="pet-counter" id="counter">Погладь лису! 🐾</div>
</div>

<!-- Platform selection screen -->

  <button class="platform-btn ios" onclick="openIOS()">

  <button class="platform-btn android" onclick="openAndroid()">

  <div class="promo-code" id="promoCode">

<div class="paw-prints">🐾 🐾 🐾 🐾 🐾</div>

    es: {

      msgs: ['Daha! Foxy bayılıyor! 🦊','Foxy mırıldanıyor! 😻','Ne sıcak eller! 🐾','Foxy çok mutlu! ✨','En iyi okşamalar! 💕'],
      petsCount: 'okşama',

  function detectLang() {
    // Telegram language first
    const tgLang = tg?.initDataUnsafe?.user?.language_code;
    const lang = (tgLang || navigator.language || 'en').slice(0, 2).toLowerCase();
    return LANGS[lang] ? lang : 'en';
  }

  const lang = detectLang();
  const t = LANGS[lang];

  // Apply translations
  document.querySelector('.title').innerHTML = `${t.title} <span>${t.brand}</span>`;
  document.querySelector('.subtitle').textContent = t.subtitle;
  document.getElementById('counter').textContent = t.pet;
  document.querySelector('.platform-title').textContent = t.happy;
  document.querySelector('.platform-subtitle').innerHTML = t.choose;
  document.querySelector('.platform-btn.ios span:last-child').textContent = t.ios;
  document.querySelector('.platform-btn.android span:last-child').textContent = t.android;
  document.querySelector('.promo-code .label').textContent = t.promoLabel;
  document.querySelector('.promo-code .hint').textContent = t.promoHint;
  document.querySelector('.back-btn').textContent = t.back;

  // RTL for Arabic/Hebrew
  if (['ar','he'].includes(lang)) document.body.style.direction = 'rtl';

  let petCount = 0;
  const foxContainer = document.getElementById('foxContainer');
  const counter = document.getElementById('counter');
  const foxScreen = document.getElementById('foxScreen');
  const platformScreen = document.getElementById('platformScreen');
  const promoCode = document.getElementById('promoCode');
  const foxEyes = document.querySelector('.fox-eyes');
  const foxHappyEyes = document.querySelector('.fox-happy-eyes');
  const emojis = ['❤️', '🧡', '💛', '🐾', '✨', '💕'];

  foxContainer.addEventListener('click', (e) => {
    petCount++;

    foxContainer.classList.remove('happy');
    void foxContainer.offsetWidth;
    foxContainer.classList.add('happy');

    foxEyes.style.display = 'none';
    foxHappyEyes.style.display = 'block';
    setTimeout(() => {
      foxEyes.style.display = 'block';
      foxHappyEyes.style.display = 'none';
    }, 800);

    for (let i = 0; i < 3; i++) setTimeout(() => spawnHeart(), i * 100);
    for (let i = 0; i < 5; i++) spawnSparkle();

    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

    counter.textContent = t.msgs[Math.min(petCount - 1, t.msgs.length - 1)];

    if (petCount >= 3) {
      setTimeout(() => showPlatforms(), 600);
    }
  });

  function showPlatforms() {
    const ua = navigator.userAgent || '';
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const isAndroid = /Android/i.test(ua);

    if (isIOS) {
      openIOS();
      return;
    }
    if (isAndroid) {
      openAndroid();
      return;
    }
    // Desktop/unknown — show choice
    foxScreen.classList.add('hidden');
    platformScreen.classList.add('visible');
  }

  function goBack() {
    platformScreen.classList.remove('visible');
    promoCode.classList.remove('visible');
    foxScreen.classList.remove('hidden');
    petCount = 0;
    counter.textContent = 'Погладь лису! 🐾';
  }

  function openIOS() {
    if (tg) {
      tg.openLink(IOS_LINK);
    } else {
      window.open(IOS_LINK, '_blank');
    }
  }

  function openAndroid() {
    promoCode.classList.add('visible');
    if (tg) {
      tg.openLink(PLAY_STORE);
    } else {
      window.open(PLAY_STORE, '_blank');
    }
  }

  function spawnHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    heart.style.left = (Math.random() * 200 + 40) + 'px';
    heart.style.top = (Math.random() * 100 + 50) + 'px';
    foxContainer.appendChild(heart);
    setTimeout(() => heart.remove(), 1000);
  }

  function spawnSparkle() {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.style.left = (Math.random() * 240 + 20) + 'px';
    sparkle.style.top = (Math.random() * 200 + 40) + 'px';
    sparkle.style.background = ['#ffcc00','#ff6b35','#fff','#ff8c42'][Math.floor(Math.random() * 4)];
    foxContainer.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 800);
  }
</script>

</html>
